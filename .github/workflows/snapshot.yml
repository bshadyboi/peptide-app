name: Daily price snapshot

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sf -X POST "${{ secrets.SUPABASE_URL }}/functions/v1/snapshot-prices" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"

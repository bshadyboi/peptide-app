name: Daily price snapshot

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Snapshot in-stock prices to price_history
        run: |
          set -euo pipefail
          code=$(curl -s -o /tmp/snapshot-body.txt -w "%{http_code}" -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/snapshot-prices" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}")
          echo "HTTP $code"
          cat /tmp/snapshot-body.txt
          test "$code" -ge 200 && test "$code" -lt 300

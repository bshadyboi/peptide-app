name: Check price alerts

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  alerts:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sf -X POST "${{ secrets.SUPABASE_URL }}/functions/v1/check-alerts" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"

# Auto-deploy Supabase migrations + edge functions on push to main.
# ONE-TIME: add GitHub repo secrets (Settings → Secrets → Actions):
#   SUPABASE_ACCESS_TOKEN  — supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_REF   — e.g. babwfemmozksdyklxhnu
#   SUPABASE_DB_PASSWORD   — database password from project creation

name: Deploy Supabase

on:
  push:
    branches: [main, master]
    paths:
      - "supabase/**"
      - ".github/workflows/deploy.yml"
      - "scripts/deploy.sh"
  workflow_dispatch:

concurrency:
  group: supabase-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push

      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy

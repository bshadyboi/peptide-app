name: PeptidePriceTracker
options:
  bundleIdPrefix: com.peptideprice
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
    CODE_SIGN_STYLE: Automatic
targets:
  PeptidePriceTracker:
    type: application
    platform: iOS
    sources:
      - PeptidePriceTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peptideprice.tracker
        INFOPLIST_FILE: PeptidePriceTracker/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: 1.1
        CURRENT_PROJECT_VERSION: 2
      configs:
        # Simulator + day-to-day dev: no push entitlement (works with free Apple ID).
        Debug:
          CODE_SIGN_ENTITLEMENTS:
        # Device / TestFlight / App Store: push alerts (requires paid Developer Program).
        Release:
          CODE_SIGN_ENTITLEMENTS: PeptidePriceTracker/PeptidePriceTracker.entitlements

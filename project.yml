name: PeptidePriceTracker
options:
  bundleIdPrefix: com.peptideprice
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
configFiles:
  Debug: Secrets.xcconfig
  Release: Secrets.xcconfig
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
    CODE_SIGN_STYLE: Automatic
targets:
  PeptidePriceTracker:
    type: application
    platform: iOS
    sources:
      - PeptidePriceTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.peptideprice.tracker
        INFOPLIST_FILE: PeptidePriceTracker/Info.plist
        # Push entitlements need an Apple Team — add when testing on a physical device:
        # CODE_SIGN_ENTITLEMENTS: PeptidePriceTracker/PeptidePriceTracker.entitlements
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
